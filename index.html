<!DOCTYPE html>
<html>
<head>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jasira Cakery Chatbot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

  <a href="https://wa.me/628119597975" 
   class="wa-button" 
   target="_blank">
   <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<div class="chat-container">

<div class="header">
  <img src="images/jasira.png" class="header-logo">
  Jasira Cakery Assistant
</div>

<div id="phone-popup" class="popup-overlay">

  <div class="popup-box">

    <h2>Selamat Datang di</h2>
    <img src="images/jasira.png" class="welcome-logo">
    <h1>Jasira Cakery</h1>

    <p>Masukkan nomor telepon untuk memulai chat</p>

    <input id="phone-input" type="tel" placeholder="Masukkan nomor telepon">

    <button id="start-chat-btn" onclick="submitPhoneNumber()">
    Mulai Chat
    </button>

    <div id="loading-chat" style="display:none;">
      ⏳ Menyiapkan chat...
    </div>

  </div>

</div>

<div id="chat-box"></div>

<div class="quick-buttons">
<button onclick="sendQuick('Lihat Katalog Kue')">📖 Katalog</button>
<button onclick="sendQuick('Lokasi Cabang Jasira Cakery')">📍 Lokasi</button>
<button onclick="sendQuick('Info Ready Stock')">🎂 Ready Stock</button>
<button onclick="sendQuick('Info Custom Cake')">🎨 Custom Cake</button>
<button onclick="sendQuick('Cara Pesan Kue di Jasira')">🛒 Cara Pesan</button>
</div>

<div class="input-area">
<input id="message" placeholder="Tulis pesan...">
<button onclick="sendMessage()">Kirim</button>
</div>

<div id="phoneErrorPopup" class="popup-overlay" style="display:none;">
  <div class="popup-content">

    <div class="error-icon">✖</div>

    <p id="popup-text">ERROR</p>

    <button onclick="closePopup()">Tutup</button>

  </div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
